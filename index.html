<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCam Web Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --overlay-bg: rgba(18, 18, 18, 0.75);
            --accent-blue: #A8C7FA;
            --accent-red: #EA4335;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-primary);
            font-family: 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- ЭКРАН ЗАПРОСА РАЗРЕШЕНИЙ --- */
        #start-screen {
            position: absolute; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        .start-btn {
            padding: 16px 32px; background: var(--accent-blue); color: #000; border: none;
            border-radius: 24px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 199, 250, 0.3); transition: transform 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .top-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 60px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: none; cursor: pointer;
        }
        .icon-btn svg { width: 22px; height: 22px; fill: var(--text-primary); }

        /* --- ЗОНА ВИДОИСКАТЕЛЯ --- */
        .viewport-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; width: 100%;
        }
        .viewport {
            background: #111; overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        /* Соотношения сторон для режимов */
        .viewport.ratio-4-3 { aspect-ratio: 4/3; width: 100%; max-width: 500px; }
        .viewport.ratio-16-9 { aspect-ratio: 16/9; width: 100%; max-width: 600px; }
        .viewport.ratio-9-16 { aspect-ratio: 9/16; height: 80vh; max-height: 600px; }

        #video-source { display: none; }
        #camera-canvas { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Сетка */
        .grid-overlay {
            position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.3s;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 33.33% 33.33%;
        }
        .grid-overlay.visible { opacity: 1; }

        /* --- ЗУМ --- */
        .zoom-controls {
            position: absolute; bottom: 170px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: var(--overlay-bg); backdrop-filter: blur(12px);
            padding: 6px 8px; border-radius: 24px; z-index: 10;
        }
        .zoom-tab {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
        }
        .zoom-tab.active { background-color: var(--text-primary); color: #000; font-weight: 700; }

        /* --- ЛЕНТА РЕЖИМОВ --- */
        .mode-selector {
            position: absolute; bottom: 100px; left: 0; right: 0; display: flex;
            justify-content: center; overflow-x: auto; gap: 24px; padding: 10px 20px;
            scrollbar-width: none; z-index: 10;
        }
        .mode-selector::-webkit-scrollbar { display: none; }
        .mode-item {
            font-size: 15px; font-weight: 500; color: var(--text-secondary); white-space: nowrap;
            cursor: pointer; transition: all 0.2s; padding: 4px 8px; border-radius: 12px;
        }
        .mode-item.active { color: var(--accent-blue); font-weight: 700; }

        /* --- НИЖНЯЯ ПАНЕЛЬ --- */
        .bottom-controls {
            height: 100px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; position: relative; z-index: 10;
        }
        .gallery-preview {
            width: 48px; height: 48px; border-radius: 12px; background: #333;
            border: 2px solid rgba(255,255,255,0.2); overflow: hidden; cursor: pointer;
        }
        .gallery-preview img, .gallery-preview video { width: 100%; height: 100%; object-fit: cover; }

        .shutter-container {
            width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .shutter-outer {
            width: 68px; height: 68px; border-radius: 50%; border: 4px solid var(--text-primary);
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .shutter-inner {
            width: 56px; height: 56px; border-radius: 50%; background-color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mode-video .shutter-inner { background-color: var(--accent-red); }
        .is-recording .shutter-inner { width: 28px; height: 28px; border-radius: 6px; background-color: var(--accent-red); }
        .is-recording .shutter-outer { border-color: var(--accent-red); }

        .switch-cam-btn {
            width: 48px; height: 48px; border-radius: 50%; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .switch-cam-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }

        /* --- ИНДИКАТОР ЗАПИСИ И СТАБИЛИЗАЦИИ --- */
        .recording-indicator {
            position: absolute; top: 80px; right: 20px; display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 16px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20;
        }
        .recording-indicator.visible { opacity: 1; }
        .rec-dot { width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; animation: pulse 1s infinite; }
        .eis-badge {
            position: absolute; top: 80px; left: 20px; background: rgba(168, 199, 250, 0.2);
            color: var(--accent-blue); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 700;
            opacity: 0; transition: opacity 0.3s; z-index: 20;
        }
        .eis-badge.visible { opacity: 1; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- МОДАЛЬНОЕ ОКНО НАСТРОЕК --- */
        .settings-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            z-index: 50; display: none; flex-direction: column; padding: 20px;
            animation: slideUp 0.3s ease;
        }
        .settings-modal.open { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .settings-title { font-size: 20px; font-weight: 700; }
        .close-btn { background: none; border: none; color: var(--accent-blue); font-size: 16px; font-weight: 600; cursor: pointer; }
        
        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .setting-label { font-size: 16px; }
        .setting-control select {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none;
        }
        /* Toggle Switch */
        .toggle {
            position: relative; display: inline-block; width: 50px; height: 28px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background-color: #444;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }

    </style>
</head>
<body>

    <!-- Экран запуска (для обхода блокировок autoplay) -->
    <div id="start-screen">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="#A8C7FA"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        <h2 style="margin: 0; font-weight: 400;">GCam Web</h2>
        <button class="start-btn" onclick="requestCameraAccess()">Разрешить доступ к камере</button>
        <p style="color: var(--text-secondary); font-size: 12px; max-width: 250px; text-align: center;">
            Требуется для работы видоискателя. Данные не покидают ваше устройство.
        </p>
    </div>

    <!-- Верхняя панель -->
    <div class="top-bar">
        <button class="icon-btn" onclick="toggleSettings()">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <div style="width: 40px;"></div>
    </div>

    <!-- Индикаторы -->
    <div class="eis-badge" id="eisBadge">EIS АКТИВНА</div>
    <div class="recording-indicator" id="recIndicator">
        <div class="rec-dot"></div>
        <div class="rec-timer" id="recTimer" style="font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums;">00:00</div>
    </div>

    <!-- Видоискатель -->
    <div class="viewport-container">
        <div class="viewport ratio-4-3" id="viewport">
            <video id="video-source" autoplay playsinline muted></video>
            <canvas id="camera-canvas"></canvas>
            <div class="grid-overlay" id="gridOverlay"></div>
        </div>
    </div>

    <!-- Зум -->
    <div class="zoom-controls">
        <div class="zoom-tab" data-zoom="0.6" onclick="setZoom(0.6)">.6</div>
        <div class="zoom-tab active" data-zoom="1" onclick="setZoom(1)">1×</div>
        <div class="zoom-tab" data-zoom="2" onclick="setZoom(2)">2×</div>
    </div>

    <!-- Режимы -->
    <div class="mode-selector" id="modeSelector">
        <div class="mode-item" onclick="setMode('night')">Ночная</div>
        <div class="mode-item" onclick="setMode('portrait')">Портрет</div>
        <div class="mode-item active" onclick="setMode('photo')">Камера</div>
        <div class="mode-item" onclick="setMode('video')">Видео</div>
    </div>

    <!-- Нижняя панель -->
    <div class="bottom-controls" id="bottomControls">
        <div class="gallery-preview" id="galleryPreview"></div>
        <div class="shutter-container" id="shutterBtn" onclick="handleShutter()">
            <div class="shutter-outer"><div class="shutter-inner"></div></div>
        </div>
        <button class="switch-cam-btn" onclick="switchCamera()">
            <svg viewBox="0 0 24 24"><path d="M20,4h-3.17L15,2H9L7.17,4H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V6C22,4.9,21.1,4,20,4z M12,17 c-2.76,0-5-2.24-5-5s2.24-5,5-5s5,2.24,5,5S14.76,17,12,17z"/></svg>
        </button>
    </div>

    <!-- Настройки -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <span class="settings-title">Настройки</span>
            <button class="close-btn" onclick="toggleSettings()">Готово</button>
        </div>
        <div class="setting-item">
            <span class="setting-label">Разрешение</span>
            <div class="setting-control">
                <select id="resSelect" onchange="updateSettings()">
                    <option value="720">HD (720p)</option>
                    <option value="1080" selected>Full HD (1080p)</option>
                    <option value="2160">4K (2160p)</option>
                </select>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">Сетка кадра</span>
            <label class="toggle">
                <input type="checkbox" id="gridToggle" checked onchange="updateSettings()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span class="setting-label">Зеркалить фронтальную камеру</span>
            <label class="toggle">
                <input type="checkbox" id="mirrorToggle" checked onchange="updateSettings()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <script>
        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        const state = {
            mode: 'photo',
            zoom: 1,
            facingMode: 'environment',
            isRecording: false,
            stream: null,
            mediaRecorder: null,
            recordedChunks: [],
            recordingStartTime: 0,
            recordingTimerInterval: null,
            animationId: null,
            settings: {
                resolution: '1080',
                grid: true,
                mirror: true
            }
        };

        // --- DOM ЭЛЕМЕНТЫ ---
        const video = document.getElementById('video-source');
        const canvas = document.getElementById('camera-canvas');
        const ctx = canvas.getContext('2d', { alpha: false, willReadFrequently: true });
        const viewport = document.getElementById('viewport');
        const gridOverlay = document.getElementById('gridOverlay');
        const shutterBtn = document.getElementById('shutterBtn');
        const bottomControls = document.getElementById('bottomControls');
        const recIndicator = document.getElementById('recIndicator');
        const recTimer = document.getElementById('recTimer');
        const eisBadge = document.getElementById('eisBadge');
        const galleryPreview = document.getElementById('galleryPreview');

        // --- ИНИЦИАЛИЗАЦИЯ ---
        async function requestCameraAccess() {
            document.getElementById('start-screen').style.display = 'none';
            await initCamera();
        }

        async function initCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(track => track.stop());
            }

            const heightMap = { '720': 720, '1080': 1080, '2160': 2160 };
            const targetHeight = heightMap[state.settings.resolution];

            const constraints = {
                video: {
                    facingMode: state.facingMode,
                    width: { ideal: 1920 },
                    height: { ideal: targetHeight },
                    // ЗАПРОС АППАРАТНОЙ СТАБИЛИЗАЦИИ (EIS)
                    advanced: [{ videoStabilizationMode: 'auto' }]
                },
                audio: state.mode === 'video'
            };

            try {
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = state.stream;
                
                // Явный вызов play() для обхода блокировок iOS/Chrome
                await video.play();
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startDrawingLoop();
                };
            } catch (err) {
                console.error("Ошибка камеры:", err);
                alert("Не удалось получить доступ к камере. Проверьте разрешения.");
                document.getElementById('start-screen').style.display = 'flex';
            }
        }

        // --- ЯДРО ОТРИСОВКИ (CANVAS) ---
        function startDrawingLoop() {
            if (state.animationId) cancelAnimationFrame(state.animationId);

            function draw() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Логика соотношения сторон и режимов
                    let sx = 0, sy = 0, sWidth = vw, sHeight = vh;
                    let filter = 'none';

                    if (state.mode === 'portrait') {
                        // Кроп 9:16 из центра
                        const targetRatio = 9/16;
                        if (vw / vh > targetRatio) {
                            sWidth = vh * targetRatio;
                            sx = (vw - sWidth) / 2;
                        } else {
                            sHeight = vw / targetRatio;
                            sy = (vh - sHeight) / 2;
                        }
                    } else if (state.mode === 'night') {
                        // Симуляция ночного режима (повышение яркости/контраста)
                        filter = 'brightness(1.3) contrast(1.15) saturate(1.2)';
                    }

                    ctx.filter = filter;

                    // Зеркалирование для фронталки
                    if (state.facingMode === 'user' && state.settings.mirror) {
                        ctx.save();
                        ctx.scale(-1, 1);
                        ctx.drawImage(video, -sx - sWidth, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                        ctx.restore();
                    } else {
                        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                    }
                    
                    ctx.filter = 'none'; // Сброс фильтра
                }
                state.animationId = requestAnimationFrame(draw);
            }
            draw();
        }

        // --- УПРАВЛЕНИЕ ---
        function setZoom(level) {
            state.zoom = level;
            document.querySelectorAll('.zoom-tab').forEach(tab => {
                tab.classList.toggle('active', parseFloat(tab.dataset.zoom) === level);
            });
            // В реальном приложении здесь менялся бы source или digital crop
        }

        function setMode(newMode) {
            state.mode = newMode;
            
            document.querySelectorAll('.mode-item').forEach(item => {
                item.classList.remove('active');
                const modeNames = { 'night': 'Ночная', 'portrait': 'Портрет', 'photo': 'Камера', 'video': 'Видео' };
                if (item.textContent === modeNames[newMode]) item.classList.add('active');
            });

            // Изменение соотношения сторон
            viewport.className = 'viewport';
            if (newMode === 'photo' || newMode === 'night') viewport.classList.add('ratio-4-3');
            else if (newMode === 'video') viewport.classList.add('ratio-16-9');
            else if (newMode === 'portrait') viewport.classList.add('ratio-9-16');

            bottomControls.classList.remove('mode-video', 'is-recording');
            if (newMode === 'video') bottomControls.classList.add('mode-video');

            // Перезапуск камеры для применения аудио-трека или новых ограничений
            initCamera();
        }

        async function switchCamera() {
            state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
            await initCamera();
        }

        // --- ЗАТВОР И ЗАПИСЬ ---
        function handleShutter() {
            if (state.mode === 'video') {
                state.isRecording ? stopRecording() : startRecording();
            } else {
                takePhoto();
            }
        }

        function takePhoto() {
            shutterBtn.style.transform = 'scale(0.9)';
            setTimeout(() => shutterBtn.style.transform = 'scale(1)', 100);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            galleryPreview.innerHTML = `<img src="${dataUrl}">`;
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function startRecording() {
            state.isRecording = true;
            bottomControls.classList.add('is-recording');
            recIndicator.classList.add('visible');
            eisBadge.classList.add('visible'); // Показываем бейдж EIS

            const canvasStream = canvas.captureStream(30);
            if (state.stream.getAudioTracks().length > 0) {
                canvasStream.addTrack(state.stream.getAudioTracks()[0]);
            }

            state.recordedChunks = [];
            const options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options.mimeType = 'video/webm';

            state.mediaRecorder = new MediaRecorder(canvasStream, options);
            state.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) state.recordedChunks.push(e.data); };
            state.mediaRecorder.onstop = () => {
                const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
                galleryPreview.innerHTML = `<video src="${URL.createObjectURL(blob)}" autoplay loop muted></video>`;
            };

            state.mediaRecorder.start();
            state.recordingStartTime = Date.now();
            state.recordingTimerInterval = setInterval(() => {
                const diff = Math.floor((Date.now() - state.recordingStartTime) / 1000);
                recTimer.textContent = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function stopRecording() {
            state.isRecording = false;
            bottomControls.classList.remove('is-recording');
            recIndicator.classList.remove('visible');
            eisBadge.classList.remove('visible');
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') state.mediaRecorder.stop();
            clearInterval(state.recordingTimerInterval);
            recTimer.textContent = '00:00';
        }

        // --- НАСТРОЙКИ ---
        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('open');
        }

        function updateSettings() {
            state.settings.resolution = document.getElementById('resSelect').value;
            state.settings.grid = document.getElementById('gridToggle').checked;
            state.settings.mirror = document.getElementById('mirrorToggle').checked;

            gridOverlay.classList.toggle('visible', state.settings.grid);
            
            // Перезапуск камеры при изменении разрешения
            if (!state.isRecording) initCamera();
        }

        // Инициализация настроек при загрузке
        window.addEventListener('load', () => {
            gridOverlay.classList.toggle('visible', state.settings.grid);
        });

    </script>
</body>
</html>
